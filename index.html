<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — Shalom Restaurante</title>
  <meta name="description" content="Painel de pedidos em tempo real do Shalom Restaurante." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple-900:#1a0033;--purple-800:#2d0057;--purple-700:#4a0080;
      --purple-600:#6b00b3;--purple-500:#8b00cc;--purple-400:#a020f0;
      --purple-300:#c060f8;--purple-100:#f0d8ff;
      --gold:#ffd700;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;
      --bg:#0f0018;--card:#1a002e;--border:rgba(168,85,247,0.2);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--purple-500);border-radius:4px}

    /* HEADER */
    .panel-header{
      position:sticky;top:0;z-index:50;
      background:rgba(15,0,24,0.95);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .ph-logo{display:flex;align-items:center;gap:10px}
    .ph-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--purple-500),var(--purple-700));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(139,0,204,0.5)}
    .ph-logo-text h1{font-size:15px;font-weight:800}
    .ph-logo-text span{font-size:11px;color:var(--purple-300)}
    .ph-right{display:flex;align-items:center;gap:10px}
    .live-badge{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--success)}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .menu-link{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.8);text-decoration:none;transition:all .2s}
    .menu-link:hover{background:var(--purple-700);color:#fff}

    /* STATS BAR */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px}
    .stat-card{background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(139,0,204,0.08));border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
    .stat-num{font-size:24px;font-weight:900;color:var(--purple-300)}
    .stat-label{font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

    /* FILTER TABS */
    .filter-tabs{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
    .filter-tabs::-webkit-scrollbar{display:none}
    .ftab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);cursor:pointer;transition:all .2s}
    .ftab.active{background:linear-gradient(135deg,var(--purple-500),var(--purple-700));border-color:var(--purple-500);color:#fff}

    /* ORDERS GRID */
    .orders-container{padding:0 20px 40px;display:flex;flex-direction:column;gap:14px}

    /* ORDER CARD */
    .order-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all .3s}
    .order-card.novo{border-left:4px solid var(--success)}
    .order-card.preparo{border-left:4px solid var(--warning)}
    .order-card.finalizado{border-left:4px solid rgba(255,255,255,0.2);opacity:.7}
    .order-card-header{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .order-num{font-size:20px;font-weight:900;color:var(--purple-300)}
    .order-status-badge{padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .badge-novo{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:var(--success)}
    .badge-preparo{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:var(--warning)}
    .badge-finalizado{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5)}
    .order-time{font-size:11px;color:rgba(255,255,255,0.4);font-weight:500}
    .order-body{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
    .order-customer{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px;display:flex;gap:12px;align-items:flex-start}
    .oc-icon{font-size:24px;flex-shrink:0}
    .oc-name{font-size:14px;font-weight:700;margin-bottom:2px}
    .oc-phone{font-size:12px;color:rgba(255,255,255,0.6)}
    .oc-delivery{font-size:11px;background:rgba(139,0,204,0.2);border:1px solid var(--border);border-radius:8px;padding:2px 8px;display:inline-block;margin-top:4px;color:var(--purple-300)}
    .order-address{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px;font-size:12px;color:rgba(255,255,255,0.7);display:flex;gap:8px;align-items:flex-start}
    .order-items-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--purple-300);margin-bottom:6px}
    .order-items{display:flex;flex-direction:column;gap:4px}
    .order-item-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .order-item-row:last-child{border-bottom:none}
    .oi-name{font-weight:500;flex:1;padding-right:8px}
    .oi-desc{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
    .oi-price{font-weight:700;color:var(--purple-300);flex-shrink:0;font-size:13px}
    .oi-qty{color:rgba(255,255,255,0.5);font-weight:600;margin-right:4px}
    .order-payment{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.2);border-radius:12px;padding:12px 14px}
    .op-left{font-size:12px;color:rgba(255,255,255,0.6)}
    .op-pay{font-size:13px;font-weight:700}
    .order-total-row{display:flex;align-items:center;justify-content:space-between;background:rgba(139,0,204,0.12);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
    .ot-label{font-size:13px;font-weight:600}
    .ot-val{font-size:20px;font-weight:900;color:var(--purple-300)}
    .order-actions{display:flex;gap:8px;flex-wrap:wrap}
    .action-btn{flex:1;min-width:100px;padding:10px 14px;border:none;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
    .action-btn:active{transform:scale(.97)}
    .btn-print{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff}
    .btn-print:hover{background:rgba(255,255,255,0.15)}
    .btn-preparo{background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.35);color:var(--warning)}
    .btn-preparo:hover{background:rgba(245,158,11,0.3)}
    .btn-done{background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.35);color:var(--success)}
    .btn-done:hover{background:rgba(34,197,94,0.3)}
    .btn-delete{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--danger);flex:0;min-width:40px;padding:10px}
    .btn-delete:hover{background:rgba(239,68,68,0.2)}

    /* EMPTY STATE */
    .empty-panel{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.4)}
    .empty-panel-icon{font-size:64px;margin-bottom:16px}
    .empty-panel h2{font-size:20px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:8px}
    .empty-panel p{font-size:14px}

    /* NEW ORDER NOTIFICATION */
    .notif-banner{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:200;background:linear-gradient(135deg,var(--success),#16a34a);border-radius:20px;padding:14px 24px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(34,197,94,0.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
    .notif-banner.show{transform:translateX(-50%) translateY(0)}

    /* PRINT STYLES */
    @media print{
      body{background:#fff;color:#000;font-size:12px}
      .panel-header,.stats-bar,.filter-tabs,.order-actions,.notif-banner,.order-card:not(.printing){display:none!important}
      .orders-container{padding:0}
      .order-card.printing{display:block!important;border:none!important;box-shadow:none!important;background:none;page-break-inside:avoid}
      .order-card{border-left:none!important;opacity:1!important}
      .print-header{display:block!important}
      .order-body{padding:0}
      .order-customer,.order-items,.order-payment,.order-total-row,.order-address{background:none!important;border:1px solid #ccc}
      *{color:#000!important}
    }
    .print-header{display:none;text-align:center;margin-bottom:12px}
    .print-header h2{font-size:18px;font-weight:900}
    .print-divider{border:none;border-top:1px dashed #000;margin:8px 0}

    @media(max-width:480px){.stats-bar{grid-template-columns:repeat(2,1fr)}.order-actions{flex-direction:column}}
  </style>
</head>
<body>

<!-- NOTIFICATION BANNER -->
<div class="notif-banner" id="notif-banner">🔔 Novo pedido recebido!</div>

<!-- HEADER -->
<header class="panel-header">
  <div class="ph-logo">
    <div class="ph-logo-icon">✡️</div>
    <div class="ph-logo-text">
      <h1>Painel do Restaurante</h1>
      <span>Shalom Restaurante</span>
    </div>
  </div>
  <div class="ph-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      Ao Vivo
    </div>
    <a href="index.html" class="menu-link">← Cardápio</a>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">Total Hoje</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-novo">0</div>
    <div class="stat-label">Novos</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-preparo">0</div>
    <div class="stat-label">Em Preparo</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-revenue" style="font-size:16px">R$ 0</div>
    <div class="stat-label">Receita</div>
  </div>
</div>

<!-- FILTER TABS -->
<div class="filter-tabs">
  <button class="ftab active" onclick="setFilter('all')">🧾 Todos</button>
  <button class="ftab" onclick="setFilter('novo')">🆕 Novos</button>
  <button class="ftab" onclick="setFilter('preparo')">🔥 Em Preparo</button>
  <button class="ftab" onclick="setFilter('finalizado')">✅ Finalizados</button>
</div>

<!-- ORDERS -->
<div class="orders-container" id="orders-container"></div>

<!-- AUDIO -->
<audio id="notif-audio" preload="auto">
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJiVjnVkWmN/gX2EhoyKi4YA" type="audio/wav">
</audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qlgfykalfqtwvhqkpahu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_616Kmkxf_joBhj4jVUWDJA_Og_OXbOx';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentFilter = 'all';
let orders = [];

function fmt(v){return'R$ '+v.toFixed(2).replace('.',',')}

function timeAgo(tsString){
  const ts = new Date(tsString).getTime();
  const diff = Math.floor((Date.now() - ts) / 1000);
  if(diff < 60) return 'Agora mesmo';
  if(diff < 3600) return Math.floor(diff/60) + 'min atrás';
  return Math.floor(diff/3600) + 'h atrás';
}

function paymentLabel(p){
  if(p === 'pix') return '🔵 PIX';
  if(p === 'dinheiro') return '💵 Dinheiro';
  if(p === 'cartao') return '💳 Cartão';
  return p;
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderUI();
}

function updateStats(){
  const today = new Date().toDateString();
  const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);
  document.getElementById('stat-total').textContent = todayOrders.length;
  document.getElementById('stat-novo').textContent = todayOrders.filter(o => o.status === 'novo').length;
  document.getElementById('stat-preparo').textContent = todayOrders.filter(o => o.status === 'preparo').length;
  const revenue = todayOrders.filter(o => o.status !== 'cancelado').reduce((s,o) => s + parseFloat(o.total || 0), 0);
  document.getElementById('stat-revenue').textContent = fmt(revenue);
}

function renderUI(){
  updateStats();
  const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);
  const container = document.getElementById('orders-container');

  if(filtered.length === 0){
    container.innerHTML = `<div class="empty-panel"><div class="empty-panel-icon">📋</div><h2>Nenhum pedido</h2><p>${currentFilter === 'all' ? 'Os pedidos aparecerão aqui em tempo real.' : 'Nenhum pedido com este status.'}</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(order => orderCard(order)).join('');
}

function orderCard(o){
  const statusLabel = {novo: '🆕 Novo', preparo: '🔥 Em Preparo', finalizado: '✅ Finalizado'}[o.status] || o.status;
  const badgeClass = {novo: 'badge-novo', preparo: 'badge-preparo', finalizado: 'badge-finalizado'}[o.status] || '';
  const addr = o.address ? `${o.address.addr}, ${o.address.num} — ${o.address.bairro}${o.address.comp ? ', ' + o.address.comp : ''}` : '';

  const prepBtn = o.status === 'novo' ? `<button class="action-btn btn-preparo" onclick="setStatus('${o.id}', 'preparo')">🔥 Em Preparo</button>` : '';
  const doneBtn = o.status !== 'finalizado' ? `<button class="action-btn btn-done" onclick="setStatus('${o.id}', 'finalizado')">✅ Finalizado</button>` : '';

  return `
  <div class="order-card ${o.status}" id="order-${o.id}">
    <div class="print-header">
      <h2>✡️ Shalom Restaurante</h2>
      <p style="font-size:12px">Pedido #${o.numeric_id} — ${new Date(o.created_at).toLocaleString('pt-BR')}</p>
      <hr class="print-divider"/>
    </div>
    <div class="order-card-header">
      <div>
        <div class="order-num">Pedido #${o.numeric_id}</div>
        <div class="order-time">${timeAgo(o.created_at)}</div>
      </div>
      <span class="order-status-badge ${badgeClass}">${statusLabel}</span>
    </div>
    <div class="order-body">
      <div class="order-customer">
        <div class="oc-icon">👤</div>
        <div>
          <div class="oc-name">${o.customer.name}</div>
          <div class="oc-phone">📞 ${o.customer.phone}</div>
          <span class="oc-delivery">${o.delivery_type === 'delivery' ? '🏍️ Delivery' : '🏪 Retirada'}</span>
        </div>
      </div>

      ${addr ? `<div class="order-address"><span>📍</span><span>${addr}</span></div>` : ''}

      <div>
        <div class="order-items-title">Itens do Pedido</div>
        <div class="order-items">
          ${o.items.map(it => `
            <div class="order-item-row">
              <div class="oi-name">
                <span class="oi-qty">${it.qty}x</span>${it.name}
                ${it.desc ? `<div class="oi-desc">${it.desc}</div>` : ''}
              </div>
              <div class="oi-price">${fmt(it.price * it.qty)}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="order-payment">
        <div>
          <div class="op-left">Pagamento</div>
          <div class="op-pay">${paymentLabel(o.payment)}</div>
          ${o.change_amount ? `<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">Troco para: ${o.change_amount}</div>` : ''}
        </div>
        ${parseFloat(o.fee) > 0 ? `<div style="font-size:12px;color:rgba(255,255,255,0.5)">Entrega: ${fmt(parseFloat(o.fee))}</div>` : '<div style="font-size:12px;color:var(--success)">Retirada</div>'}
      </div>

      <div class="order-total-row">
        <span class="ot-label">💰 Total</span>
        <span class="ot-val">${fmt(parseFloat(o.total))}</span>
      </div>

      <div class="order-actions">
        <button class="action-btn btn-print" onclick="printOrder('${o.id}')">🖨️ Imprimir</button>
        ${prepBtn}
        ${doneBtn}
        <button class="action-btn btn-delete" onclick="deleteOrder('${o.id}')" title="Excluir pedido">🗑️</button>
      </div>
    </div>
  </div>`;
}

async function setStatus(orderId, status) {
  const { error } = await supabase
    .from('pedidos')
    .update({ status: status })
    .eq('id', orderId);
  if (error) console.error("Error updating status:", error);
}

async function deleteOrder(orderId) {
  if (!confirm('Excluir este pedido?')) return;
  const { error } = await supabase
    .from('pedidos')
    .delete()
    .eq('id', orderId);
  if (error) console.error("Error deleting order:", error);
}

function printOrder(orderId) {
  document.querySelectorAll('.order-card').forEach(c => c.classList.remove('printing'));
  const card = document.getElementById('order-' + orderId);
  if (card) card.classList.add('printing');
  setTimeout(() => window.print(), 100);
}

function showNotification() {
  const banner = document.getElementById('notif-banner');
  banner.classList.add('show');
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  } catch (e) {}
  setTimeout(() => banner.classList.remove('show'), 4000);
}

// ─── INIT ───
async function fetchOrders() {
  const { data, error } = await supabase
    .from('pedidos')
    .select('*')
    .order('created_at', { ascending: false });
  if (data) {
    orders = data;
    renderUI();
  } else {
    console.error("Error fetching orders:", error);
  }
}

function setupRealtime() {
  supabase
    .channel('public:pedidos')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, payload => {
      console.log('Realtime Update:', payload);
      if (payload.eventType === 'INSERT') {
        orders.unshift(payload.new);
        showNotification();
      } else if (payload.eventType === 'UPDATE') {
        const index = orders.findIndex(o => o.id === payload.new.id);
        if (index !== -1) orders[index] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        orders = orders.filter(o => o.id !== payload.old.id);
      }
      renderUI();
    })
    .subscribe();
}

// Start
fetchOrders();
setupRealtime();

// Update time ago every minute
setInterval(renderUI, 60000);
</script>
</body>
</html>
