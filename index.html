<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — Shalom Restaurante</title>
  <style>
    :root {
      --purple-900:#1a0033;--purple-800:#2d0057;--purple-700:#4a0080;
      --purple-600:#6b00b3;--purple-500:#8b00cc;--purple-400:#a020f0;
      --purple-300:#c060f8;--purple-100:#f0d8ff;
      --gold:#ffd700;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;
      --bg:#0f0018;--card:#1a002e;--border:rgba(168,85,247,0.2);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden}
    
    .panel-header{position:sticky;top:0;z-index:50;background:rgba(15,0,24,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
    .ph-logo{display:flex;align-items:center;gap:10px}
    .ph-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--purple-500),var(--purple-700));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .ph-logo-text h1{font-size:15px;font-weight:800}
    .ph-right{display:flex;align-items:center;gap:10px}
    .live-badge{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--success);font-weight:700}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px}
    .stat-card{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
    .stat-num{font-size:22px;font-weight:900;color:var(--purple-300)}
    .stat-label{font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-top:2px}

    .filter-tabs{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto}
    .ftab{padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);font-size:12px;color:#fff;cursor:pointer}
    .ftab.active{background:var(--purple-600);border-color:var(--purple-500)}

    .orders-container{padding:0 20px 40px;display:flex;flex-direction:column;gap:14px}
    .order-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;position:relative}
    .order-card.novo{border-left:4px solid var(--success)}
    .order-num{font-size:18px;font-weight:900;color:var(--purple-300)}
    .order-status{font-size:11px;font-weight:800;text-transform:uppercase;margin-bottom:10px}
    .order-info{background:rgba(255,255,255,0.03);border-radius:12px;padding:12px;margin-bottom:12px}
    .order-item{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .order-total{display:flex;justify-content:space-between;font-weight:900;font-size:18px;margin-top:10px;color:var(--gold)}
    
    .actions{display:flex;gap:8px;margin-top:15px}
    .btn{flex:1;padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer}
    .btn-done{background:var(--success);color:#fff}
    .btn-del{background:var(--danger);color:#fff;flex:0;min-width:40px}

    #notif-banner{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--success);padding:10px 20px;border-radius:20px;z-index:1000;transition:transform 0.5s}
    #notif-banner.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="notif-banner">🔔 Novo pedido recebido!</div>

<header class="panel-header">
  <div class="ph-logo">
    <div class="ph-logo-icon">✡️</div>
    <div class="ph-logo-text"><h1>Painel Shalom</h1><span>Gestão de Pedidos</span></div>
  </div>
  <div class="ph-right">
    <div class="live-badge"><div class="live-dot"></div>Ao Vivo</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-novo">0</div><div class="stat-label">Novos</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-revenue" style="font-size:14px">R$ 0</div><div class="stat-label">Receita</div></div>
</div>

<div class="filter-tabs">
  <button class="ftab active" data-filter="all">Todos</button>
  <button class="ftab" data-filter="novo">Novos</button>
  <button class="ftab" data-filter="finalizado">Finalizados</button>
</div>

<div class="orders-container" id="orders-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL = 'https://qlgfykalfqtwvhqkpahu.supabase.co';
var SUPABASE_KEY = 'sb_publishable_616Kmkxf_joBhj4jVUWDJA_Og_OXbOx';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var orders = [];
var currentFilter = 'all';

function fmt(v){ return 'R$ ' + (v || 0).toFixed(2).replace('.', ','); }

function renderUI() {
  var container = document.getElementById('orders-container');
  var filtered = orders.filter(function(o) { return currentFilter === 'all' || o.status === currentFilter; });
  
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var o = filtered[i];
    var itemsHtml = '';
    for (var j = 0; j < (o.items || []).length; j++) {
      var it = o.items[j];
      itemsHtml += '<div class="order-item"><span>' + it.qty + 'x ' + it.name + '</span><span>' + fmt(it.price * it.qty) + '</span></div>';
    }

    html += '<div class="order-card ' + o.status + '">' +
      '<div class="order-num">Pedido #' + o.numeric_id + '</div>' +
      '<div class="order-status">' + o.status.toUpperCase() + '</div>' +
      '<div class="order-info">' +
        '<strong>' + (o.customer ? o.customer.name : 'Cliente') + '</strong><br>' +
        '📞 ' + (o.customer ? o.customer.phone : '-') + '<br>' +
        '📍 ' + (o.address ? o.address.addr + ', ' + o.address.num : 'Retirada') +
      '</div>' +
      '<div>' + itemsHtml + '</div>' +
      '<div class="order-total"><span>Total</span><span>' + fmt(o.total) + '</span></div>' +
      '<div class="actions">' +
        (o.status !== 'finalizado' ? '<button class="btn btn-done" onclick="setStatus(\'' + o.id + '\', \'finalizado\')">Concluir</button>' : '') +
        '<button class="btn btn-del" onclick="deleteOrder(\'' + o.id + '\')">🗑️</button>' +
      '</div>' +
    '</div>';
  }
  container.innerHTML = html || '<div style="text-align:center;padding:40px;color:#888">Nenhum pedido encontrado.</div>';
  updateStats();
}

function updateStats() {
  document.getElementById('stat-total').textContent = orders.length;
  document.getElementById('stat-novo').textContent = orders.filter(function(o){ return o.status === 'novo'; }).length;
  var rev = 0;
  for(var i=0; i<orders.length; i++) { if(orders[i].status !== 'cancelado') rev += (orders[i].total || 0); }
  document.getElementById('stat-revenue').textContent = fmt(rev);
}

function setStatus(id, status) {
  supabase.from('pedidos').update({ status: status }).eq('id', id).then(function() { fetchOrders(); });
}

function deleteOrder(id) {
  if(!confirm('Excluir?')) return;
  supabase.from('pedidos').delete().eq('id', id).then(function() { fetchOrders(); });
}

function fetchOrders() {
  supabase.from('pedidos').select('*').order('created_at', { ascending: false }).then(function(res) {
    if (res.data) {
      orders = res.data;
      renderUI();
    }
  });
}

function setupRealtime() {
  supabase.channel('pedidos-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, function() {
    fetchOrders();
    showNotification();
  }).subscribe();
}

function showNotification() {
  var b = document.getElementById('notif-banner');
  b.classList.add('show');
  setTimeout(function(){ b.classList.remove('show'); }, 4000);
}

document.querySelectorAll('.ftab').forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll('.ftab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderUI();
  }
});

window.onload = function() {
  fetchOrders();
  setupRealtime();
};
</script>
</body>
</html>
